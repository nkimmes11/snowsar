site_name: SnowSAR
site_description: SAR-based snow depth retrieval system
repo_url: https://github.com/nkimmes11/snowsar
repo_name: nkimmes11/snowsar

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Algorithms:
      - Lievens: algorithms/lievens.md
      - DpRSE: algorithms/dprse.md
  - API Reference: api.md
  - Developer Guide: developer.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
